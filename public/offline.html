<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Azyah Style</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0B0B0C;
      color: white;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .offline-container {
      max-width: 400px;
      padding: 40px 20px;
    }
    .offline-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.7;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      font-weight: 600;
    }
    p {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .retry-button {
      background: white;
      color: #0B0B0C;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-button:hover {
      opacity: 0.9;
    }
    .retry-button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📱</div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again to continue discovering amazing fashion with Azyah.</p>
    <button class="retry-button" onclick="window.location.reload()">
      Try Again
    </button>
  </div>
  
  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
