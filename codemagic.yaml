workflows:
  azyah-ios-capacitor:
    name: Azyah iOS (Capacitor)
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - azyah-secrets
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.azyah.style

      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        APP_STORE_APP_ID: "6755971189"

      node: v20.14.0
      xcode: 16.0
      cocoapods: default

    scripts:
      - name: Validate RevenueCat API key
        script: |
          if [ -z "$VITE_REVENUECAT_API_KEY" ]; then
            echo "ERROR: VITE_REVENUECAT_API_KEY is not set!"
            echo "Please add it in Codemagic UI: App settings → Environment variables"
            exit 1
          fi
          echo "✓ VITE_REVENUECAT_API_KEY is configured"

      - name: Install dependencies
        script: |
          npm ci

      - name: Build web assets (Vite)
        script: |
          npm run build
          echo "✓ Vite build complete → dist/"

      - name: Sync Capacitor (iOS + Android)
        script: |
          npx cap sync ios
          npx cap sync android || true
          echo "✓ Capacitor synced to ios/ and android/"

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          echo "✓ CocoaPods installed"

      - name: Set iOS build number from Codemagic BUILD_NUMBER
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Apply signing settings
        script: |
          xcode-project use-profiles

      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # DO NOT ENABLE ↓ until you want App Store review
        # submit_to_app_store: false
