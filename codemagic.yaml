workflows:
  ios-capacitor:
    name: Azyah iOS (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m2

    # (Optional) once you set up App Store Connect integration in Codemagic UI,
    # you can uncomment the 'integrations' + 'ios_signing' blocks below
    # integrations:
    #   app_store_connect: codemagic
    # environment:
    #   ios_signing:
    #     distribution_type: app_store
    #     bundle_identifier: "com.azyah.style"

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Build web app (Vite)
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods for iOS project
        script: |
          cd ios/App
          pod install

      - name: Build iOS .ipa with Xcode
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/**/*.app
      - ios/App/build/**/*.dSYM
