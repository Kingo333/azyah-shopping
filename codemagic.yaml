workflows:
  azyah-ios-capacitor:
    name: Azyah iOS (Capacitor)
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.azyah.style

      vars:
        # Xcode workspace & scheme from your iOS project
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App

        # From your App Store Connect URL
        APP_STORE_APP_ID: "6755971189"

      # Use a Codemagic-supported Xcode image
      node: v20.14.0
      xcode: 16.0
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build web assets & sync Capacitor iOS
        script: |
          npm run build
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Apply signing settings
        script: |
          xcode-project use-profiles

      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # submit_to_app_store: false   # leave commented for now
