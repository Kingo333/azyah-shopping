workflows:
  azyah-ios-capacitor:
    name: Azyah iOS (Capacitor)
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic

    environment:
      node: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.azyah.style

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app (Vite)
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build iOS .ipa with Xcode
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-path $CM_BUILD_DIR/ios/App.xcarchive

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - YOUR_EMAIL_ADDRESS_HERE
        notify:
          success: true
          failure: true
